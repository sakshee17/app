# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — MAIN PIPELINE  (Build Once, Promote)
#
# Triggered on every push to the `main` branch.
# Does NOT build any Docker images. Instead it:
#   1. Downloads the image-metadata artifact from the latest CI/CD — Release run
#      (downloaded ONCE in the Promote stage — never again)
#   2. Stores devBuildId as a pipeline-level variable via ADO REST API
#      so all downstream stages use $(devBuildId) directly
#   3. Retags  qa-{id}  →  prod-{id}  (same binary, new environment tag)
#   4. Deploys prod-{id} to Stage (simulated, manual approval)
#   5. Deploys prod-{id} to Prod  (REAL deploy, manual approval)
#
# Image lineage:
#   dev-42  (built by ci-dev)  →  qa-42  (release)  →  prod-42  (this pipeline)
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • Service Connection "azure-service-connection" (Azure ARM) ← PROD ONLY
#   • ADO Environment   "stage"  ← ADD APPROVAL CHECKS (simulated deploy)
#   • ADO Environment   "prod"   ← ADD APPROVAL CHECKS (REAL deploy)
#   • App Services (PROD ONLY): tiny-app-prod-fe, tiny-app-prod-be
#   • ⚠️  First run: ADO will prompt to allow access to "CI/CD — Release" artifacts
#          → click Permit to continue (one-time only)
# ═════════════════════════════════════════════════════════════════════════════

# ── Pipeline resource: download artifacts from CI/CD — Release ───────────────
# ⚠️  MANUAL STEP: 'CI/CD — Release' MUST exactly match the pipeline name in ADO.
resources:
  pipelines:
    - pipeline: ci_release
      source: 'CI/CD — Release'
      trigger: none

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'
  # devBuildId is set at runtime via REST API in the Promote stage.
  # Defining it here with a sentinel value lets the YAML compile cleanly.
  - name: devBuildId
    value: 'pending'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Promote
#
# • Downloads the image-metadata artifact from CI/CD — Release (ONCE, here only)
# • Reads the Dev Build ID (same ID carried all the way from ci-dev) and
#   stores it as a pipeline-run variable via REST API
# • Retags qa-{id} → prod-{id} for both images
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Promote
    displayName: '🏷️ Promote — qa → prod'
    jobs:
      - job: Retag_Images
        displayName: 'Download artifact (once) → Set pipeline var → Retag'
        steps:
          - checkout: none

          # ── Step 1: Download image-metadata artifact from CI/CD — Release ─────
          # This is the ONLY download in the entire pipeline run.
          - download: ci_release
            artifact: image-metadata
            displayName: '⬇️ Download image-metadata from CI/CD — Release (once only)'

          # ── Step 2: Read build ID and store as pipeline-level variable ────────
          - script: |
              set -e
              DEV_BUILD_ID=$(cat $(Pipeline.Workspace)/ci_release/image-metadata/build-id.txt)

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Original Dev Build ID   : $DEV_BUILD_ID"
              echo "  Promoting from tag      : qa-$DEV_BUILD_ID"
              echo "  Promoting to tag        : prod-$DEV_BUILD_ID"
              echo "  Full lineage            : dev-$DEV_BUILD_ID → qa-$DEV_BUILD_ID → prod-$DEV_BUILD_ID"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Write into this job's scope (for steps that follow in this job)
              echo "##vso[task.setvariable variable=devBuildId]$DEV_BUILD_ID"

              # Write into the pipeline run's variable store via ADO REST API.
              # Stage → Prod will use $(devBuildId) without stageDependencies.
              BODY="{\"devBuildId\":{\"value\":\"${DEV_BUILD_ID}\",\"isSecret\":false,\"allowOverride\":true}}"
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -u ":${SYSTEM_ACCESSTOKEN}" \
                -X PATCH \
                -H "Content-Type: application/json" \
                -d "$BODY" \
                "${SYSTEM_COLLECTIONURI}${SYSTEM_TEAMPROJECT}/_apis/build/builds/${BUILD_BUILDID}/variables?api-version=7.0")

              if [ "$HTTP_STATUS" -eq 200 ]; then
                echo "✅ Pipeline variable 'devBuildId' stored → $DEV_BUILD_ID"
              else
                echo "❌ REST API returned HTTP $HTTP_STATUS"
                exit 1
              fi
            name: readMetadata
            displayName: '📖 Read Build ID → Store as pipeline variable'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              SYSTEM_COLLECTIONURI: $(System.CollectionUri)
              SYSTEM_TEAMPROJECT: $(System.TeamProject)
              BUILD_BUILDID: $(Build.BuildId)

          # ── Step 3: Retag frontend — qa-{id} → prod-{id} ─────────────────────
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(feImageRepo):qa-$(devBuildId)'
              targetImage: '$(feImageRepo):prod-$(devBuildId)'

          # ── Step 4: Retag backend — qa-{id} → prod-{id} ──────────────────────
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(beImageRepo):qa-$(devBuildId)'
              targetImage: '$(beImageRepo):prod-$(devBuildId)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to Stage  ⚠️  MANUAL APPROVAL  [🎭 Simulated]
# $(devBuildId) is already set — no download, no stageDependencies expression.
# Configure approvers: Pipelines → Environments → stage → Approvals and checks
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Stage
    displayName: '🚀 Deploy — Stage  [⚠️ Approval + 🎭 Simulated]'
    dependsOn: Promote
    condition: succeeded('Promote')
    jobs:
      - deployment: Deploy_Frontend_Stage
        displayName: '🖥️ Frontend → Stage'
        environment: 'stage'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-fe'
                    imageName: '$(feImageRepo):prod-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_Stage
        displayName: '🔧 Backend → Stage'
        environment: 'stage'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-be'
                    imageName: '$(beImageRepo):prod-$(devBuildId)'
                    simulate: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Production  ⚠️  MANUAL APPROVAL  [🚀 REAL DEPLOY]
# $(devBuildId) is already set — no download, no stageDependencies expression.
# Configure approvers: Pipelines → Environments → prod → Approvals and checks
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Prod
    displayName: '🚀 Deploy — Production  [⚠️ Approval + 🚀 REAL]'
    dependsOn: Deploy_Stage
    condition: succeeded('Deploy_Stage')
    jobs:
      - deployment: Deploy_Frontend_Prod
        displayName: '🖥️ Frontend → Production'
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-fe'
                    imageName: '$(feImageRepo):prod-$(devBuildId)'
                    simulate: false   # ← REAL deploy to Azure App Service

      - deployment: Deploy_Backend_Prod
        displayName: '🔧 Backend → Production'
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-be'
                    imageName: '$(beImageRepo):prod-$(devBuildId)'
                    simulate: false   # ← REAL deploy to Azure App Service
